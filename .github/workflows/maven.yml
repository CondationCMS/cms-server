name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25-ea'
        distribution: 'temurin'
        cache: maven

    # Playwright-Binaries cachen → kein erneuter Download bei jedem Run
    - name: Cache Playwright browsers
      uses: actions/cache@v5
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ hashFiles('**/pom.xml') }}
        restore-keys: playwright-

    # Systembibliotheken für Chromium (fehlen auf Ubuntu-Runner)
    - name: Install Playwright system dependencies
      run: mvn -B exec:java -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install-deps chromium" --file pom.xml

    # Chromium-Binary installieren (nur wenn Cache nicht greift)
    - name: Install Playwright browsers
      run: mvn -B exec:java -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install chromium" --file pom.xml

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    # Test-Reports auch bei Fehlern sichern
    - name: Upload Surefire Reports
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: surefire-reports
        path: target/surefire-reports/
        retention-days: 7